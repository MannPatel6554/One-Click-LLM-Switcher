<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <title>LLM Switcher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 270px;
      background: #07070c;
      color: #f5f5f7;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background glow */
    .popup-glow {
      position: absolute;
      top: -30px; left: 50%;
      transform: translateX(-50%);
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(108, 99, 255, 0.18) 0%, transparent 70%);
      filter: blur(25px);
      z-index: -1;
      pointer-events: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      position: relative;
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: block;
      box-shadow: 0 4px 12px rgba(108, 99, 255, 0.25);
      animation: pulse-glow 2.5s infinite ease-in-out;
    }
    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(108, 99, 255, 0.2)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 10px rgba(108, 99, 255, 0.5)); }
    }

    .title { 
      font-size: 13px; 
      font-weight: 700; 
      letter-spacing: 1px; 
      color: #ffffff; 
      background: linear-gradient(135deg, #ffffff, #8b8b9a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    #detectedTitle { font-size: 11px; font-weight: 600; margin-top: 1px; }
    .color-claude { color: #c96b3a; }
    .color-perplexity { color: #a78bfa; }
    .color-gemini { color: #60a5fa; }
    .color-grok { color: #ffffff; }
    .color-error { color: #f87171; }

    .status-bar {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 11px;
      color: #8b8b9a;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #33333f;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }
    .status-dot.active { 
      background: #10a37f; 
      box-shadow: 0 0 10px #10a37f; 
      animation: status-pulse 1.5s infinite alternate;
    }
    .status-dot.error { 
      background: #ef4444; 
      box-shadow: 0 0 10px #ef4444; 
    }
    @keyframes status-pulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.2px;
      color: #4b5563;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      margin-bottom: 8px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.03);
      border-radius: 10px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-2px);
    }
    .btn:active { 
      transform: translateY(0) scale(0.98); 
    }

    .btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      transform: none;
      box-shadow: none !important;
    }

    .btn.hidden-btn { display: none; }

    .btn .icon { font-size: 15px; width: 20px; text-align: center; }
    .btn .arrow { 
      margin-left: auto; 
      opacity: 0.6; 
      font-size: 11px; 
      transition: transform 0.3s ease;
    }
    .btn:hover .arrow {
      transform: translateX(3px);
    }

    .claude { background: linear-gradient(135deg, #c96b3a, #9c4c23); }
    .claude:hover { box-shadow: 0 4px 15px rgba(199, 107, 58, 0.4); }

    .perplexity { background: linear-gradient(135deg, #7c3aed, #5b21b6); }
    .perplexity:hover { box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4); }

    .gemini { background: linear-gradient(135deg, #1a73e8, #0c50b6); }
    .gemini:hover { box-shadow: 0 4px 15px rgba(26, 115, 232, 0.4); }

    .grok { background: linear-gradient(135deg, #1e1e24, #0b0b0d); border: 1px solid rgba(255,255,255,0.06); }
    .grok:hover { box-shadow: 0 4px 15px rgba(255, 255, 255, 0.15); border-color: rgba(255,255,255,0.15); }

    .chatgpt { background: linear-gradient(135deg, #10a37f, #0c755c); }
    .chatgpt:hover { box-shadow: 0 4px 15px rgba(16, 163, 127, 0.4); }

    .copy-btn { 
      background: linear-gradient(135deg, #6c63ff, #4b40ff); 
      border: 1px solid rgba(255,255,255,0.1); 
    }
    .copy-btn:hover {
      box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 12px 0;
    }

    .history-text {
      font-size: 10px;
      color: #6b7280;
      text-align: center;
      margin-top: 8px;
    }

    .footer {
      font-size: 9px;
      color: #374151;
      text-align: center;
      margin-top: 10px;
      letter-spacing: 0.5px;
    }

    .spinner {
      display: none;
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-left: auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn.loading .spinner { display: block; }
    .btn.loading .arrow   { display: none; }
  </style>
</head>
<body>

  <div class="popup-glow"></div>

  <div class="header">
    <img class="logo" src="icons/icon128.png" alt="logo" />
    <div>
      <div class="title">LLM SWITCHER</div>
      <div id="detectedTitle" class="">Detecting...</div>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Current page check ho raha hai…</span>
  </div>

  <button class="btn copy-btn" id="copyChatBtn">
    <span class="icon">📋</span> Copy Current Chat
    <span class="arrow">✓</span>
    <div class="spinner"></div>
  </button>

  <div class="divider"></div>

  <div class="label">Continue chat in →</div>

  <button class="btn claude" id="toClaude">
    <span class="icon">◆</span> Claude
    <span class="arrow">→</span>
    <div class="spinner"></div>
  </button>
  
  <button class="btn perplexity" id="toPerplexity">
    <span class="icon">🔍</span> Perplexity
    <span class="arrow">→</span>
    <div class="spinner"></div>
  </button>

  <button class="btn chatgpt" id="toChatGPT">
    <span class="icon">🤖</span> ChatGPT
    <span class="arrow">→</span>
    <div class="spinner"></div>
  </button>

  <button class="btn gemini" id="toGemini">
    <span class="icon">✦</span> Gemini
    <span class="arrow">→</span>
    <div class="spinner"></div>
  </button>

  <button class="btn grok" id="toGrok">
    <span class="icon">𝕏</span> Grok
    <span class="arrow">→</span>
    <div class="spinner"></div>
  </button>

  <div class="divider"></div>

  <div class="history-text" id="historyText"></div>

  <div class="footer">⚡ Zero server · 100% browser-side</div>

  <script src="popup.js"></script>
</body>
</html>
